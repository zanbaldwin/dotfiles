name: 'sites'
services:
    web:
        image: 'nginx:1.31.0-alpine'
        restart: 'unless-stopped'
        environment:
            TZ: 'Europe/Amsterdam'
        ports:
            - target: 80
              published: 7487
              protocol: 'tcp'
        configs:
            - source: 'nginx'
              target: '/etc/nginx/conf.d/default.conf'
        volumes:
            - type: 'bind'
              source: '/mnt/tank4/sites'
              target: '/var/www/html'
              read_only: true

    deploy:
        image: 'linuxserver/openssh-server:amd64-latest'
        restart: 'unless-stopped'
        environment:
            DOCKER_MODS: 'linuxserver/mods:universal-package-install'
            INSTALL_PACKAGES: 'rsync'
            PUID: '1000'
            PGID: '1000'
            TZ: 'Europe/Amsterdam'
            USER_NAME: 'deploy'
            PUBLIC_KEY_FILE: '/run/secrets/authorized'
            LOG_STDOUT: 'true'
        secrets:
            - 'authorized'
        ports:
            - target: 2222
              published: 7483
              protocol: 'tcp'
        volumes:
            - type: 'bind'
              source: '/mnt/tank4/sites'
              target: '/var/www/html'
              read_only: false
        security_opt: ['no-new-privileges:true']
        cap_drop: ['ALL']
        cap_add: ['CHOWN', 'DAC_OVERRIDE', 'FOWNER', 'SETUID', 'SETGID', 'KILL', 'SYS_CHROOT', 'AUDIT_WRITE']
        pids_limit: 200
        mem_limit: '256m'
        cpus: 1.0

secrets:
    authorized:
        file: '/mnt/tank4/secrets/sites/public'

configs:
    nginx:
        content: |
            server {
                listen 80 default_server;
                server_name _;
                root /var/www/html;
                server_tokens off;
                charset utf-8;
                location / {
                    index index.html;
                    autoindex on;
                    autoindex_exact_size off;
                    autoindex_localtime on;
                    try_files $$uri $$uri/ =404;
                }
            }
