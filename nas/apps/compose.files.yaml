name: 'files'
services:
    explorer:
        image: 'nxzai/explorer:v2.2.3'
        restart: 'unless-stopped'
        environment:
            TZ: 'Europe/Amsterdam'
            NODE_ENV: 'production'
            PUBLIC_URL: 'https://files.lan.zanbaldwin.com'
            SEARCH_DEEP: 'false'
            EDITOR_EXTENSIONS: 'toml,dockerfile,makefile'
        ports:
            - target: 3000
              published: 3453
              protocol: 'tcp'
        volumes:
            - type: 'bind'
              source: '/mnt/fast/apps/explorer'
              target: '/config'
              read_only: false
            - type: 'bind'
              source: '/mnt/tank4/drive'
              target: '/mnt'
              read_only: true
